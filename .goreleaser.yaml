version: 2

project_name: bflask

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: bflask
    main: .
    binary: bflask

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - windows
      - darwin

    goarch:
      - amd64
      - arm64
      - "386"

archives:
  - id: default
    formats:
      - tar.gz

    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  abbrev: -1
  title: "Changes"

  groups:
    - title: "Features"
      regexp: '^.*?(feat|feature)(\([[:word:]-]+\))??!?:.+$'
      order: 0

    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]-]+\))??!?:.+$'
      order: 1

    - title: "Other changes"
      order: 999

  filters:
    include:
      - '^feat(\([[:word:]-]+\))??!?:'
      - '^feature(\([[:word:]-]+\))??!?:'
      - '^fix(\([[:word:]-]+\))??!?:'

release:
  header: |
    ## bflask {{ .Tag }}

    This release includes the following changes:

  footer: |

    ---
    Built with GoReleaser
